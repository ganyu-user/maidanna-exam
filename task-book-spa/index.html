<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上书店管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .add-btn {
            background-color: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-btn:hover {
            background-color: #40a9ff;
        }

        .sort-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-area label {
            color: #666;
            font-size: 14px;
        }

        .sort-area select {
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .book-table {
            width: 100%;
            border-collapse: collapse;
        }

        .book-table th,
        .book-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .book-table th {
            background-color: #fafafa;
            font-weight: bold;
            color: #333;
        }

        .book-table tr:hover {
            background-color: #f5f5f5;
            cursor: pointer;
        }

        .price {
            color: #f5222d;
            font-weight: bold;
        }

        .category-tag {
            display: inline-block;
            padding: 2px 8px;
            background-color: #e6f7ff;
            color: #1890ff;
            border-radius: 4px;
            font-size: 12px;
        }

        .delete-btn {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #ff7875;
        }

        /* 弹窗样式 */
        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-mask.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background-color: white;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #999;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            padding: 24px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-size: 14px;
        }

        .form-item input,
        .form-item textarea,
        .form-item select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-item textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-item input:focus,
        .form-item textarea:focus,
        .form-item select:focus {
            outline: none;
            border-color: #1890ff;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #d9d9d9;
            background-color: white;
        }

        .btn:hover {
            background-color: #f5f5f5;
        }

        .btn-primary {
            background-color: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .btn-primary:hover {
            background-color: #40a9ff;
            border-color: #40a9ff;
        }

        .btn-danger {
            background-color: #ff4d4f;
            color: white;
            border-color: #ff4d4f;
        }

        .btn-danger:hover {
            background-color: #ff7875;
            border-color: #ff7875;
        }

        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>网上书店管理系统</h1>
        
        <div class="toolbar">
            <button class="add-btn" id="addBtn">+ 添加书籍</button>
            
            <div class="sort-area">
                <label>排序：</label>
                <select id="sortField">
                    <option value="title">按书名</option>
                    <option value="price">按价格</option>
                    <option value="category">按分类</option>
                </select>
                <select id="sortOrder">
                    <option value="asc">升序</option>
                    <option value="desc">降序</option>
                </select>
            </div>
        </div>

        <table class="book-table">
            <thead>
                <tr>
                    <th>书名</th>
                    <th>价格</th>
                    <th>分类</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="bookList">
                <!-- 书籍列表通过JS动态生成 -->
            </tbody>
        </table>
        <div class="empty-tip" id="emptyTip" style="display:none;">暂无书籍，点击"添加书籍"按钮添加一本吧</div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div class="modal-mask" id="bookModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加书籍</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label>书名</label>
                    <input type="text" id="bookTitle" placeholder="请输入书名">
                </div>
                <div class="form-item">
                    <label>价格</label>
                    <input type="number" id="bookPrice" placeholder="请输入价格" step="0.01" min="0">
                </div>
                <div class="form-item">
                    <label>分类</label>
                    <input type="text" id="bookCategory" placeholder="请输入分类，如：编程、小说、文学">
                </div>
                <div class="form-item">
                    <label>描述</label>
                    <textarea id="bookDescription" placeholder="请输入书籍描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteInModal" style="display:none; margin-right:auto;">删除</button>
                <button class="btn" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 引入 Redux（用CDN方式） -->
    <script src="https://cdn.jsdelivr.net/npm/redux@4.2.1/dist/redux.min.js"></script>
    <!-- 引入我们自己的脚本（注意顺序：类型 -> actions -> reducer -> app） -->
    <script src="./dist/app.js"></script>
</body>
</html>
